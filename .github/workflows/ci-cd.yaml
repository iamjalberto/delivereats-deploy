# ============================================
# Delivereats CI/CD Pipeline
# Build → Test → Push Images → Deploy to K8s
# ============================================
name: Delivereats CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/delivereats

jobs:
  # ==========================================
  # JOB 1: Build & Test
  # ==========================================
  test:
    name: "🧪 Test Services"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - auth-service
          - restaurant-catalog-service
          - order-service
          - delivery-service
          - notification-service
          - payment-service
          - api-gateway
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "${{ matrix.service }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci || npm install

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: npm test -- --coverage --forceExit
        continue-on-error: false

  test-python:
    name: "🐍 Test FX Service"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: fx-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: fx-service
        run: pytest tests/ -v --cov=app --cov-report=term-missing
        continue-on-error: false

  # ==========================================
  # JOB 2: Build & Push Docker Images
  # ==========================================
  build-and-push:
    name: "🐳 Build & Push Images"
    runs-on: ubuntu-latest
    needs: [test, test-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: auth-service
            context: ./auth-service
          - service: restaurant-catalog-service
            context: ./restaurant-catalog-service
          - service: order-service
            context: ./order-service
          - service: delivery-service
            context: ./delivery-service
          - service: notification-service
            context: ./notification-service
          - service: fx-service
            context: ./fx-service
          - service: payment-service
            context: ./payment-service
          - service: api-gateway
            context: ./api-gateway
          - service: frontend
            context: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ==========================================
  # JOB 3: Deploy to Kubernetes (k3s on GCP VM)
  # ==========================================
  deploy:
    name: "🚀 Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Configure k3s registry credentials on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'SSHEOF'
            # Configurar acceso a GHCR para k3s
            sudo mkdir -p /etc/rancher/k3s
            sudo tee /etc/rancher/k3s/registries.yaml > /dev/null << 'EOF'
          mirrors:
            ghcr.io:
              endpoint:
                - "https://ghcr.io"
          configs:
            "ghcr.io":
              auth:
                username: ${{ github.actor }}
                password: ${{ secrets.GHCR_TOKEN }}
          EOF
            sudo systemctl restart k3s || true
            sleep 10
          SSHEOF

      - name: Copy K8s manifests to VM
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r k8s/ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/k8s-manifests/

      - name: Deploy to Kubernetes
        env:
          SHA_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << SSHEOF
            set -e
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "🔄 Deploying to k3s cluster"
            echo "📦 Image version: ${SHA_TAG}"

            # Aplicar namespace y configuración
            sudo kubectl apply -f ~/k8s-manifests/namespace.yaml
            sudo kubectl apply -f ~/k8s-manifests/configmap.yaml
            sudo kubectl apply -f ~/k8s-manifests/secrets.yaml
            sudo kubectl apply -f ~/k8s-manifests/persistent-volumes.yaml

            # Aplicar infraestructura (Redis, RabbitMQ)
            sudo kubectl apply -f ~/k8s-manifests/redis.yaml
            sudo kubectl apply -f ~/k8s-manifests/rabbitmq.yaml

            # Esperar a que Redis y RabbitMQ estén listos
            sudo kubectl rollout status deployment/redis -n delivereats --timeout=120s || true
            sudo kubectl rollout status deployment/rabbitmq -n delivereats --timeout=180s || true

            # Aplicar microservicios
            sudo kubectl apply -f ~/k8s-manifests/auth-service.yaml
            sudo kubectl apply -f ~/k8s-manifests/restaurant-catalog-service.yaml
            sudo kubectl apply -f ~/k8s-manifests/order-service.yaml
            sudo kubectl apply -f ~/k8s-manifests/delivery-service.yaml
            sudo kubectl apply -f ~/k8s-manifests/notification-service.yaml
            sudo kubectl apply -f ~/k8s-manifests/fx-service.yaml
            sudo kubectl apply -f ~/k8s-manifests/payment-service.yaml

            # Aplicar API Gateway y Frontend
            sudo kubectl apply -f ~/k8s-manifests/api-gateway.yaml
            sudo kubectl apply -f ~/k8s-manifests/frontend.yaml

            # Aplicar Ingress
            sudo kubectl apply -f ~/k8s-manifests/ingress.yaml

            # Actualizar imágenes con el SHA del commit
            SERVICES="auth-service restaurant-catalog-service order-service delivery-service notification-service fx-service payment-service api-gateway frontend"
            for svc in \$SERVICES; do
              sudo kubectl set image deployment/\$svc \$svc=${{ env.IMAGE_PREFIX }}/\$svc:${SHA_TAG} -n delivereats || true
            done

            echo "✅ Deployment complete!"
          SSHEOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'SSHEOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            echo "=== Deployment Status ==="
            sudo kubectl get deployments -n delivereats
            echo ""
            echo "=== Pods Status ==="
            sudo kubectl get pods -n delivereats
            echo ""
            echo "=== Services ==="
            sudo kubectl get services -n delivereats
            echo ""
            echo "=== Ingress ==="
            sudo kubectl get ingress -n delivereats
          SSHEOF

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'SSHEOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            echo "❌ Deployment failed! Rolling back..."
            SERVICES="auth-service restaurant-catalog-service order-service delivery-service notification-service fx-service payment-service api-gateway frontend"
            for svc in $SERVICES; do
              sudo kubectl rollout undo deployment/$svc -n delivereats || true
            done
            echo "🔄 Rollback complete"
          SSHEOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
