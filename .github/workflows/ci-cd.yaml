# ============================================
# Delivereats CI/CD Pipeline
# Build → Test → Push Images → Deploy to K8s
# ============================================
name: Delivereats CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/delivereats

jobs:
  # ==========================================
  # JOB 1: Build & Test
  # ==========================================
  test:
    name: "🧪 Test Services"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - auth-service
          - restaurant-catalog-service
          - order-service
          - delivery-service
          - notification-service
          - payment-service
          - api-gateway
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: npm test -- --coverage --forceExit
        continue-on-error: false

  test-python:
    name: "🐍 Test FX Service"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: fx-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: fx-service
        run: pytest tests/ -v --cov=app --cov-report=term-missing
        continue-on-error: false

  # ==========================================
  # JOB 2: Build & Push Docker Images
  # ==========================================
  build-and-push:
    name: "🐳 Build & Push Images"
    runs-on: ubuntu-latest
    needs: [test, test-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: auth-service
            context: ./auth-service
          - service: restaurant-catalog-service
            context: ./restaurant-catalog-service
          - service: order-service
            context: ./order-service
          - service: delivery-service
            context: ./delivery-service
          - service: notification-service
            context: ./notification-service
          - service: fx-service
            context: ./fx-service
          - service: payment-service
            context: ./payment-service
          - service: api-gateway
            context: ./api-gateway
          - service: frontend
            context: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ==========================================
  # JOB 3: Deploy to Kubernetes (k3s on GCP VM)
  # ==========================================
  deploy:
    name: "🚀 Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: [test, test-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Pull latest code on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} 'cd ~/SA_PROYECTO_201346084 && git pull origin main'

      - name: Build and import Docker images on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} 'bash -s' << 'SSHEOF'
            set -e
            cd ~/SA_PROYECTO_201346084
            SERVICES="auth-service restaurant-catalog-service order-service delivery-service notification-service fx-service payment-service api-gateway frontend"
            for svc in $SERVICES; do
              echo "🐳 Building $svc..."
              docker build -t ghcr.io/jalbertochigua/delivereats/$svc:latest ./$svc/
              echo "📦 Importing $svc to k3s..."
              docker save ghcr.io/jalbertochigua/delivereats/$svc:latest | sudo k3s ctr images import -
            done
            echo "✅ All images built and imported"
          SSHEOF

      - name: Deploy to Kubernetes
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} 'bash -s' << 'SSHEOF'
            set -e
            cd ~/SA_PROYECTO_201346084

            echo "🔄 Deploying to k3s cluster"

            # Aplicar namespace y configuración
            sudo kubectl apply -f k8s/namespace.yaml
            sudo kubectl apply -f k8s/configmap.yaml
            sudo kubectl apply -f k8s/secrets.yaml
            sudo kubectl apply -f k8s/persistent-volumes.yaml

            # Aplicar infraestructura (Redis, RabbitMQ)
            sudo kubectl apply -f k8s/redis.yaml
            sudo kubectl apply -f k8s/rabbitmq.yaml

            # Esperar a que Redis y RabbitMQ estén listos
            sudo kubectl rollout status deployment/redis -n delivereats --timeout=120s || true
            sudo kubectl rollout status deployment/rabbitmq -n delivereats --timeout=180s || true

            # Aplicar microservicios
            sudo kubectl apply -f k8s/auth-service.yaml
            sudo kubectl apply -f k8s/restaurant-catalog-service.yaml
            sudo kubectl apply -f k8s/order-service.yaml
            sudo kubectl apply -f k8s/delivery-service.yaml
            sudo kubectl apply -f k8s/notification-service.yaml
            sudo kubectl apply -f k8s/fx-service.yaml
            sudo kubectl apply -f k8s/payment-service.yaml

            # Aplicar API Gateway y Frontend
            sudo kubectl apply -f k8s/api-gateway.yaml
            sudo kubectl apply -f k8s/frontend.yaml

            # Aplicar Ingress
            sudo kubectl apply -f k8s/ingress.yaml

            # Restart deployments para tomar las imágenes nuevas
            SERVICES="auth-service restaurant-catalog-service order-service delivery-service notification-service fx-service payment-service api-gateway frontend"
            for svc in $SERVICES; do
              sudo kubectl rollout restart deployment/$svc -n delivereats || true
            done

            echo "✅ Deployment complete!"
          SSHEOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'SSHEOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            echo "=== Deployment Status ==="
            sudo kubectl get deployments -n delivereats
            echo ""
            echo "=== Pods Status ==="
            sudo kubectl get pods -n delivereats
            echo ""
            echo "=== Services ==="
            sudo kubectl get services -n delivereats
            echo ""
            echo "=== Ingress ==="
            sudo kubectl get ingress -n delivereats
          SSHEOF

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'SSHEOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            echo "❌ Deployment failed! Rolling back..."
            SERVICES="auth-service restaurant-catalog-service order-service delivery-service notification-service fx-service payment-service api-gateway frontend"
            for svc in $SERVICES; do
              sudo kubectl rollout undo deployment/$svc -n delivereats || true
            done
            echo "🔄 Rollback complete"
          SSHEOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
