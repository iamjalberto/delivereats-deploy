# ============================================
# Delivereats CI/CD Pipeline
# Build → Test → Push Images → Deploy to K8s
# ============================================
name: Delivereats CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/delivereats

jobs:
  # ==========================================
  # JOB 1: Build & Test
  # ==========================================
  test:
    name: "🧪 Test Services"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - auth-service
          - restaurant-catalog-service
          - order-service
          - delivery-service
          - notification-service
          - payment-service
          - api-gateway
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "${{ matrix.service }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci || npm install

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: npm test -- --coverage --forceExit
        continue-on-error: false

  test-python:
    name: "🐍 Test FX Service"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: fx-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: fx-service
        run: pytest tests/ -v --cov=app --cov-report=term-missing
        continue-on-error: false

  # ==========================================
  # JOB 2: Build & Push Docker Images
  # ==========================================
  build-and-push:
    name: "🐳 Build & Push Images"
    runs-on: ubuntu-latest
    needs: [test, test-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: auth-service
            context: ./auth-service
          - service: restaurant-catalog-service
            context: ./restaurant-catalog-service
          - service: order-service
            context: ./order-service
          - service: delivery-service
            context: ./delivery-service
          - service: notification-service
            context: ./notification-service
          - service: fx-service
            context: ./fx-service
          - service: payment-service
            context: ./payment-service
          - service: api-gateway
            context: ./api-gateway
          - service: frontend
            context: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ==========================================
  # JOB 3: Deploy to Kubernetes
  # ==========================================
  deploy:
    name: "🚀 Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}

      - name: Deploy to Kubernetes
        run: |
          echo "🔄 Deploying to cluster: ${{ secrets.GKE_CLUSTER_NAME }}"
          echo "📦 Image version: ${{ github.sha }}"

          # Aplicar namespace y configuración
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/persistent-volumes.yaml

          # Aplicar infraestructura (Redis, RabbitMQ)
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/rabbitmq.yaml

          # Esperar a que Redis y RabbitMQ estén listos
          kubectl rollout status deployment/redis -n delivereats --timeout=120s
          kubectl rollout status deployment/rabbitmq -n delivereats --timeout=120s

          # Aplicar microservicios
          kubectl apply -f k8s/auth-service.yaml
          kubectl apply -f k8s/restaurant-catalog-service.yaml
          kubectl apply -f k8s/order-service.yaml
          kubectl apply -f k8s/delivery-service.yaml
          kubectl apply -f k8s/notification-service.yaml
          kubectl apply -f k8s/fx-service.yaml
          kubectl apply -f k8s/payment-service.yaml

          # Aplicar API Gateway y Frontend
          kubectl apply -f k8s/api-gateway.yaml
          kubectl apply -f k8s/frontend.yaml

          # Aplicar Ingress
          kubectl apply -f k8s/ingress.yaml

          # Actualizar imágenes con el SHA del commit
          SERVICES="auth-service restaurant-catalog-service order-service delivery-service notification-service fx-service payment-service api-gateway frontend"
          for svc in $SERVICES; do
            kubectl set image deployment/$svc $svc=${{ env.IMAGE_PREFIX }}/$svc:${{ github.sha }} -n delivereats || true
          done

          echo "✅ Deployment complete!"

      - name: Verify deployment
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployments -n delivereats
          echo ""
          echo "=== Pods Status ==="
          kubectl get pods -n delivereats
          echo ""
          echo "=== Services ==="
          kubectl get services -n delivereats
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n delivereats

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Rolling back..."
          SERVICES="auth-service restaurant-catalog-service order-service delivery-service notification-service fx-service payment-service api-gateway frontend"
          for svc in $SERVICES; do
            kubectl rollout undo deployment/$svc -n delivereats || true
          done
          echo "🔄 Rollback complete"
