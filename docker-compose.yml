version: "3.8"

services:
  # ==================== MICROSERVICES ====================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    environment:
      PORT: 50051
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: auth_db
      JWT_SECRET: delivereats_secret_key_sa_2026
    ports:
      - "50051:50051"
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  restaurant-catalog-service:
    build:
      context: ./restaurant-catalog-service
      dockerfile: Dockerfile
    environment:
      PORT: 50052
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: restaurant_db
      RABBITMQ_URL: amqp://delivereats:delivereats2026@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "50052:50052"
    volumes:
      - restaurant-db-data:/var/lib/postgresql/data

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    environment:
      PORT: 50053
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: order_db
      RABBITMQ_URL: amqp://delivereats:delivereats2026@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "50053:50053"
    volumes:
      - order-db-data:/var/lib/postgresql/data

  delivery-service:
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
    environment:
      PORT: 50054
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: delivery_db
      ORDER_SERVICE_HOST: order-service:50053
    depends_on:
      - order-service
    ports:
      - "50054:50054"
    volumes:
      - delivery-db-data:/var/lib/postgresql/data

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    environment:
      PORT: 50055
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER:-jalbertochigua@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-xyjd snzf dgsh ptls}
    ports:
      - "50055:50055"

  # ==================== P5: FX SERVICE (Python) ====================
  fx-service:
    build:
      context: ./fx-service
      dockerfile: Dockerfile
    environment:
      GRPC_PORT: 50056
      FLASK_PORT: 5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EXCHANGE_API_KEY: ""
    depends_on:
      - redis
    ports:
      - "50056:50056"
      - "5000:5000"

  # ==================== P5: PAYMENT SERVICE ====================
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    environment:
      PORT: 50057
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: payment_db
    ports:
      - "50057:50057"
    volumes:
      - payment-db-data:/var/lib/postgresql/data

  # ==================== RABBITMQ (Cola de Pedidos) ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: delivereats
      RABBITMQ_DEFAULT_PASS: delivereats2026
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== P5: REDIS (Cache para FX) ====================
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      JWT_SECRET: delivereats_secret_key_sa_2026
      AUTH_SERVICE_HOST: auth-service:50051
      RESTAURANT_SERVICE_HOST: restaurant-catalog-service:50052
      ORDER_SERVICE_HOST: order-service:50053
      DELIVERY_SERVICE_HOST: delivery-service:50054
      NOTIFICATION_SERVICE_HOST: notification-service:50055
      FX_SERVICE_HOST: fx-service:50056
      PAYMENT_SERVICE_HOST: payment-service:50057
    depends_on:
      - auth-service
      - restaurant-catalog-service
      - order-service
      - delivery-service
      - notification-service
      - fx-service
      - payment-service
    ports:
      - "3000:3000"
    volumes:
      - evidence-uploads:/app/uploads

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

volumes:
  auth-db-data:
  restaurant-db-data:
  order-db-data:
  delivery-db-data:
  payment-db-data:
  redis-data:
  rabbitmq-data:
  evidence-uploads:
