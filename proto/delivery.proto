syntax = "proto3";

package delivery;

service DeliveryService {
  rpc AcceptOrder (AcceptOrderRequest) returns (DeliveryResponse);
  rpc UpdateDeliveryStatus (UpdateDeliveryStatusRequest) returns (DeliveryResponse);
  rpc GetDeliveryByOrder (GetDeliveryByOrderRequest) returns (DeliveryResponse);
  rpc ListAvailableOrders (ListAvailableOrdersRequest) returns (ListDeliveriesResponse);
  rpc ListMyDeliveries (ListMyDeliveriesRequest) returns (ListDeliveriesResponse);
  rpc UploadEvidence (UploadEvidenceRequest) returns (EvidenceResponse);
  rpc GetEvidence (GetEvidenceRequest) returns (EvidenceResponse);
  rpc ListDeliveredOrders (ListDeliveredOrdersRequest) returns (ListDeliveriesResponse);
}

message AcceptOrderRequest {
  int32 order_id = 1;
  int32 delivery_person_id = 2;
  string delivery_person_name = 3;
}

message UpdateDeliveryStatusRequest {
  int32 order_id = 1;
  string status = 2; // EN_CAMINO, ENTREGADA, CANCELADA
  int32 delivery_person_id = 3;
  string delivery_person_name = 4;
  string reason = 5;
}

message GetDeliveryByOrderRequest {
  int32 order_id = 1;
}

message ListAvailableOrdersRequest {}

message ListMyDeliveriesRequest {
  int32 delivery_person_id = 1;
}

message DeliveryResponse {
  bool success = 1;
  string message = 2;
  Delivery delivery = 3;
}

message ListDeliveriesResponse {
  repeated Delivery deliveries = 1;
}

message Delivery {
  int32 id = 1;
  int32 order_id = 2;
  int32 delivery_person_id = 3;
  string delivery_person_name = 4;
  string status = 5;
  string accepted_at = 6;
  string delivered_at = 7;
}

// Evidence messages (P5)
message UploadEvidenceRequest {
  int32 order_id = 1;
  int32 delivery_id = 2;
  int32 driver_id = 3;
  string photo_path = 4;
  string photo_original_name = 5;
  string photo_mime_type = 6;
  int32 photo_size_bytes = 7;
  string notes = 8;
}

message GetEvidenceRequest {
  int32 order_id = 1;
}

message ListDeliveredOrdersRequest {}

message EvidenceResponse {
  bool success = 1;
  string message = 2;
  EvidenceData evidence = 3;
}

message EvidenceData {
  int32 id = 1;
  int32 delivery_id = 2;
  int32 order_id = 3;
  int32 driver_id = 4;
  string photo_path = 5;
  string photo_original_name = 6;
  string photo_mime_type = 7;
  int32 photo_size_bytes = 8;
  string notes = 9;
  string uploaded_at = 10;
}
