syntax = "proto3";

package restaurant;

service RestaurantCatalogService {
  // Restaurantes
  rpc CreateRestaurant (CreateRestaurantRequest) returns (RestaurantResponse);
  rpc GetRestaurant (GetRestaurantRequest) returns (RestaurantResponse);
  rpc UpdateRestaurant (UpdateRestaurantRequest) returns (RestaurantResponse);
  rpc DeleteRestaurant (DeleteRestaurantRequest) returns (GenericResponse);
  rpc ListRestaurants (ListRestaurantsRequest) returns (ListRestaurantsResponse);

  // Menu Items
  rpc CreateMenuItem (CreateMenuItemRequest) returns (MenuItemResponse);
  rpc GetMenuItem (GetMenuItemRequest) returns (MenuItemResponse);
  rpc UpdateMenuItem (UpdateMenuItemRequest) returns (MenuItemResponse);
  rpc DeleteMenuItem (DeleteMenuItemRequest) returns (GenericResponse);
  rpc ListMenuItems (ListMenuItemsRequest) returns (ListMenuItemsResponse);

  // Promotions
  rpc CreatePromotion (CreatePromotionRequest) returns (PromotionResponse);
  rpc ListPromotions (ListPromotionsRequest) returns (ListPromotionsResponse);
  rpc DeletePromotion (DeletePromotionRequest) returns (GenericResponse);

  // Search & Filters
  rpc SearchRestaurants (SearchRestaurantsRequest) returns (ListRestaurantsResponse);
}

message CreateRestaurantRequest {
  string name = 1;
  string address = 2;
  string phone = 3;
  string schedule = 4;
  string food_type = 5;
  int32 owner_id = 6;
}

message GetRestaurantRequest {
  int32 id = 1;
}

message UpdateRestaurantRequest {
  int32 id = 1;
  string name = 2;
  string address = 3;
  string phone = 4;
  string schedule = 5;
  string food_type = 6;
}

message DeleteRestaurantRequest {
  int32 id = 1;
}

message ListRestaurantsRequest {}

message RestaurantResponse {
  bool success = 1;
  string message = 2;
  Restaurant restaurant = 3;
}

message ListRestaurantsResponse {
  repeated Restaurant restaurants = 1;
}

message Restaurant {
  int32 id = 1;
  string name = 2;
  string address = 3;
  string phone = 4;
  string schedule = 5;
  string food_type = 6;
  int32 owner_id = 7;
}

// Menu Items
message CreateMenuItemRequest {
  int32 restaurant_id = 1;
  string name = 2;
  string description = 3;
  float price = 4;
  bool available = 5;
  string category = 6;
}

message GetMenuItemRequest {
  int32 id = 1;
}

message UpdateMenuItemRequest {
  int32 id = 1;
  string name = 2;
  string description = 3;
  float price = 4;
  bool available = 5;
  string category = 6;
}

message DeleteMenuItemRequest {
  int32 id = 1;
}

message ListMenuItemsRequest {
  int32 restaurant_id = 1;
}

message MenuItemResponse {
  bool success = 1;
  string message = 2;
  MenuItem item = 3;
}

message ListMenuItemsResponse {
  repeated MenuItem items = 1;
}

message MenuItem {
  int32 id = 1;
  int32 restaurant_id = 2;
  string name = 3;
  string description = 4;
  float price = 5;
  bool available = 6;
  string category = 7;
}

message GenericResponse {
  bool success = 1;
  string message = 2;
}

// Promotions
message CreatePromotionRequest {
  int32 restaurant_id = 1;
  string title = 2;
  string description = 3;
  string discount_type = 4;
  float discount_value = 5;
  string starts_at = 6;
  string ends_at = 7;
}

message DeletePromotionRequest {
  int32 id = 1;
}

message ListPromotionsRequest {
  int32 restaurant_id = 1;
}

message Promotion {
  int32 id = 1;
  int32 restaurant_id = 2;
  string title = 3;
  string description = 4;
  string discount_type = 5;
  float discount_value = 6;
  string starts_at = 7;
  string ends_at = 8;
  bool active = 9;
}

message PromotionResponse {
  bool success = 1;
  string message = 2;
  Promotion promotion = 3;
}

message ListPromotionsResponse {
  repeated Promotion promotions = 1;
}

// Search
message SearchRestaurantsRequest {
  string query = 1;
  string food_type = 2;
  string filter = 3;
  bool has_promotions = 4;
}
