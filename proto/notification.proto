syntax = "proto3";

package notification;

service NotificationService {
  rpc SendOrderCreated (OrderCreatedNotification) returns (NotificationResponse);
  rpc SendOrderCancelledByClient (OrderCancelledNotification) returns (NotificationResponse);
  rpc SendOrderInRoute (OrderInRouteNotification) returns (NotificationResponse);
  rpc SendOrderCancelledByRestaurant (OrderCancelledByThirdNotification) returns (NotificationResponse);
  rpc SendOrderCancelledByDelivery (OrderCancelledByThirdNotification) returns (NotificationResponse);
  rpc SendOrderRejected (OrderRejectedNotification) returns (NotificationResponse);
}

message OrderCreatedNotification {
  string client_name = 1;
  string client_email = 2;
  int32 order_id = 3;
  repeated ProductItem products = 4;
  float total = 5;
  string created_at = 6;
  string status = 7;
}

message OrderCancelledNotification {
  string client_name = 1;
  string client_email = 2;
  int32 order_id = 3;
  repeated ProductItem products = 4;
  string cancelled_at = 5;
  string status = 6;
}

message OrderInRouteNotification {
  string client_email = 1;
  int32 order_id = 2;
  string delivery_person_name = 3;
  repeated ProductItem products = 4;
  string status = 5;
}

message OrderCancelledByThirdNotification {
  string client_email = 1;
  string cancelled_by_name = 2;
  string cancelled_by_role = 3;
  string reason = 4;
  int32 order_id = 5;
  repeated ProductItem products = 6;
  string status = 7;
}

message OrderRejectedNotification {
  string client_email = 1;
  string restaurant_name = 2;
  int32 order_id = 3;
  repeated ProductItem products = 4;
  string status = 5;
}

message ProductItem {
  string name = 1;
  int32 quantity = 2;
  float price = 3;
}

message NotificationResponse {
  bool success = 1;
  string message = 2;
}
