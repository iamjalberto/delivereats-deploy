syntax = "proto3";

package order;

service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder (GetOrderRequest) returns (OrderResponse);
  rpc ListOrdersByClient (ListOrdersByClientRequest) returns (ListOrdersResponse);
  rpc ListOrdersByRestaurant (ListOrdersByRestaurantRequest) returns (ListOrdersResponse);
  rpc ListReadyOrders (ListReadyOrdersRequest) returns (ListOrdersResponse);
  rpc UpdateOrderStatus (UpdateOrderStatusRequest) returns (OrderResponse);
  rpc CancelOrder (CancelOrderRequest) returns (OrderResponse);
}

message CreateOrderRequest {
  int32 client_id = 1;
  string client_name = 2;
  string client_email = 3;
  int32 restaurant_id = 4;
  string restaurant_name = 5;
  repeated OrderItem items = 6;
  string delivery_address = 7;
}

message OrderItem {
  int32 menu_item_id = 1;
  string name = 2;
  int32 quantity = 3;
  float price = 4;
}

message GetOrderRequest {
  int32 id = 1;
}

message ListOrdersByClientRequest {
  int32 client_id = 1;
}

message ListOrdersByRestaurantRequest {
  int32 restaurant_id = 1;
}

message ListReadyOrdersRequest {}

message UpdateOrderStatusRequest {
  int32 id = 1;
  string status = 2; // EN_PROCESO, LISTA, FINALIZADA, EN_CAMINO, ENTREGADA
  int32 updated_by = 3;
  string updated_by_role = 4;
  string updated_by_name = 5;
}

message CancelOrderRequest {
  int32 id = 1;
  string cancelled_by_role = 2; // CLIENTE, RESTAURANTE, REPARTIDOR
  string cancelled_by_name = 3;
  string reason = 4;
}

message OrderResponse {
  bool success = 1;
  string message = 2;
  Order order = 3;
}

message ListOrdersResponse {
  repeated Order orders = 1;
}

message Order {
  int32 id = 1;
  int32 client_id = 2;
  string client_name = 3;
  string client_email = 4;
  int32 restaurant_id = 5;
  string restaurant_name = 6;
  repeated OrderItem items = 7;
  float total = 8;
  string status = 9;
  string delivery_address = 10;
  string created_at = 11;
  string updated_at = 12;
  int32 delivery_person_id = 13;
  string delivery_person_name = 14;
}
