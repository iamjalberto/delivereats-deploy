# ============================================
# API Gateway - Deployment + Service
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: delivereats
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/jalbertochigua/delivereats/api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: delivereats-config
            - secretRef:
                name: delivereats-secrets
          env:
            - name: PORT
              value: "3000"
          volumeMounts:
            - name: evidence-uploads
              mountPath: /app/uploads
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: evidence-uploads
          persistentVolumeClaim:
            claimName: evidence-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: delivereats
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
