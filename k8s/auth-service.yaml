# ============================================
# Auth Service - Deployment + Service
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: delivereats
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/jalbertochigua/delivereats/auth-service:latest
          ports:
            - containerPort: 50051
          envFrom:
            - configMapRef:
                name: delivereats-config
            - secretRef:
                name: delivereats-secrets
          env:
            - name: PORT
              value: "50051"
            - name: DB_NAME
              value: "auth_db"
          volumeMounts:
            - name: auth-db-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres"]
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: auth-db-data
          persistentVolumeClaim:
            claimName: auth-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: delivereats
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 50051
      targetPort: 50051
      protocol: TCP
  type: ClusterIP
