# ============================================
# Persistent Volume Claims (PVCs)
# ============================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auth-db-pvc
  namespace: delivereats
  labels:
    app: auth-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
